name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          debug: true
          script: |
            set -e
            export PATH="$HOME/.bun/bin:$PATH"

            # First deploy: clone if missing
            if [ ! -d /opt/trader-v2 ]; then
              sudo mkdir -p /opt/trader-v2
              sudo chown $USER:$USER /opt/trader-v2
              git clone https://github.com/CalNicklin/trader-v2.git /opt/trader-v2
            fi

            cd /opt/trader-v2
            git pull origin main

            # Install bun if missing
            if ! command -v bun &> /dev/null; then
              curl -fsSL https://bun.sh/install | bash
              export PATH="$HOME/.bun/bin:$PATH"
            fi

            bun install --frozen-lockfile

            # Ensure data directory exists
            mkdir -p /opt/trader-v2/data

            # Run migrations
            bun run db:migrate

            # Restart service
            sudo systemctl restart trader-v2

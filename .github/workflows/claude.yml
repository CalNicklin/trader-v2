name: Claude Code

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: |
            https://github.com/obra/superpowers-marketplace.git
          plugins: |
            superpowers@superpowers-marketplace
          prompt: |
            You are the self-improvement agent for a live autonomous trading system.
            Your job is to review production performance data and make code improvements
            that will improve trading outcomes. You have full access to the codebase and
            can change any file. All changes go through PR review.

            ## Step 1: Explore Production Data

            The production SQLite DB lives at `/opt/trader-v2/data/trader.db` on the
            VPS. Query it directly with sqlite3 over SSH — pull only what you need
            for the question you're investigating, instead of a giant upfront dump.

            Schema source of truth: read `src/db/schema.ts` in this repo (you have
            it locally — no SSH needed).

            Connection pattern:
              ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sqlite3 -header /opt/trader-v2/data/trader.db '<SQL>'"

            Useful starting queries (treat as examples, not a checklist):
            - Population health: `SELECT status, COUNT(*) FROM strategies GROUP BY status;`
            - Recent trades: `SELECT * FROM paper_trades ORDER BY created_at DESC LIMIT 30;`
            - Per-strategy metrics: `SELECT * FROM strategy_metrics;`
            - Unacted high-confidence insights:
              `SELECT insight_type, observation, confidence, created_at FROM trade_insights
               WHERE led_to_improvement IS NULL AND confidence >= 0.7
               ORDER BY confidence DESC LIMIT 50;`
            - Missed opportunities (mostly strategy_id IS NULL):
              `SELECT observation, confidence FROM trade_insights
               WHERE insight_type = 'missed_opportunity'
               ORDER BY created_at DESC LIMIT 30;`
            - Recent graduation events: `SELECT * FROM graduation_events ORDER BY created_at DESC LIMIT 20;`
            - Recent mutations: `SELECT * FROM strategy_mutations ORDER BY created_at DESC LIMIT 20;`

            Drill in based on what you find. Join across tables freely. The DB is
            small (~3 MB) and your queries are read-only — don't worry about cost.

            ## Step 2: Analyze and Identify Improvements

            Read CLAUDE.md for project conventions. Read relevant specs in docs/specs/
            for design context on why things are built the way they are.

            Focus areas:
            - Strategies with low Sharpe or high drawdown — investigate their signal logic
            - High-confidence insights where ledToImprovement is null — unacted-on opportunities
            - Patterns in missed opportunities — what signals could catch them
            - Evolution proposals rejected by the validator — are constraints too tight?
            - Prompt quality — are LLM prompts for trade review, evolution, dispatch producing good outputs?
            - Cost efficiency — are we spending tokens wisely?
            - Population health — if activePaperCount is below 4, this is a CRITICAL priority.
              Investigate why strategies are being killed faster than created. Check graduation
              events for patterns (are kill thresholds too aggressive for current volatility?
              Are young strategies being culled before accumulating meaningful data?). Consider:
              adjusting DRAWDOWN_KILL_PCT, adding tournament protection for strategies with <10
              trades, writing new seed strategies with battle-tested parameters, or tuning the
              evolution floor's recovery spawn logic if you see repeated spawn-kill churn.

            ## Step 3: Make Changes

            Explore the codebase to understand how modules connect before editing.
            Make targeted improvements.

            ### Branch policy — STRICT

            **NEVER push directly to `main`.** Every change goes through a PR.

            - **If you were triggered by a comment on an existing open PR**
              (the `issue_comment` event payload contains `issue.pull_request`),
              you MUST push your commits to that PR's head branch. Look up the
              branch via `gh pr view <PR_NUMBER> --json headRefName` and check
              that branch out before committing. Never open a duplicate PR with
              the same change — append to the existing one so review stays in
              one place.

            - **If there is no existing PR** (workflow_dispatch, or an issue
              comment on a non-PR issue), create a new branch
              (`claude/<short-description>`) and open a fresh PR against `main`
              with `gh pr create`.

            - If a review comment asks you to address specific concerns and you
              decide some of them shouldn't be addressed, post a reply
              explaining the trade-off rather than silently dropping them.

            Before committing, you MUST run all three checks and fix any errors:
            1. `bunx tsc --noEmit` — TypeScript type check (fix unused imports, type errors)
            2. `bunx biome check src/ tests/` — Linter (fix formatting, lint issues)
            3. `bun test --preload ./tests/preload.ts` — Full test suite

            Do NOT commit or open a PR until all three pass cleanly.

            If you determine the system is performing well and no improvements are needed,
            commit a short summary to docs/self-improvement-log.md explaining your analysis
            and why no changes were warranted (still via a PR — not direct to main).
          claude_args: "--model claude-opus-4-6 --max-turns 50 --allowedTools 'Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch'"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
